<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Islamic Knowledge Vault — Graph View</title>
<meta name="description" content="Interactive graph visualization of the Islamic Knowledge Obsidian vault — 824 notes connected by 105k+ wikilinks">
<meta property="og:title" content="Islamic Knowledge Vault — Graph View">
<meta property="og:description" content="Interactive force-directed graph of 824 Islamic knowledge notes">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
  #graph-canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #graph-canvas:active { cursor: grabbing; }
  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,18,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
    padding: 10px 18px; display: flex; align-items: center; gap: 14px;
    z-index: 100; pointer-events: auto;
    font-size: 13px; white-space: nowrap;
    box-shadow: 0 4px 32px rgba(0,0,0,0.6);
  }
  #hud .title { color: rgba(255,255,255,0.7); font-weight: 500; letter-spacing: 0.5px; }
  #hud .count { color: rgba(255,255,255,0.35); font-size: 12px; }
  #hud .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); }
  #search-input {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 5px 10px; color: #ddd; font-size: 13px;
    width: 180px; outline: none; transition: all 0.2s;
  }
  #search-input:focus { border-color: rgba(136,204,255,0.4); background: rgba(255,255,255,0.08); }
  #search-input::placeholder { color: rgba(255,255,255,0.2); }
  #tooltip {
    position: fixed; pointer-events: none; z-index: 200;
    background: rgba(10,10,20,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 10px 14px; max-width: 320px;
    font-size: 13px; line-height: 1.5; opacity: 0;
    transition: opacity 0.15s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-title { color: #fff; font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  #tooltip .tt-cat { color: rgba(255,255,255,0.35); font-size: 11px; margin-bottom: 4px; }
  #tooltip .tt-preview { color: rgba(255,255,255,0.5); font-size: 12px; }
  #tooltip .tt-links { color: rgba(136,204,255,0.5); font-size: 11px; margin-top: 4px; }
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,18,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    z-index: 100; pointer-events: auto;
    font-size: 12px; color: rgba(255,255,255,0.5);
  }
  #controls label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
  #controls input[type="checkbox"] { accent-color: #88CCFF; width: 14px; height: 14px; cursor: pointer; }
  #controls .ctrl-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.08); }
  #legend {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    background: rgba(10,10,18,0.8); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
    padding: 10px 12px; z-index: 100; font-size: 11px;
    display: flex; flex-direction: column; gap: 4px;
    max-height: 60vh; overflow-y: auto;
  }
  #legend .legend-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.5); }
  #legend .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  #legend .legend-label { white-space: nowrap; }
  #loading {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0a12; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.06);
    border-top-color: #88CCFF; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .load-text { color: rgba(255,255,255,0.25); font-size: 13px; letter-spacing: 2px; }
  @media (max-width: 640px) {
    #hud { top: 10px; padding: 8px 12px; gap: 8px; font-size: 11px; flex-wrap: wrap; justify-content: center; }
    #search-input { width: 120px; font-size: 11px; }
    #controls { bottom: 10px; padding: 8px 12px; gap: 8px; font-size: 11px; flex-wrap: wrap; justify-content: center; }
    #legend { display: none; }
    #tooltip { max-width: 200px; font-size: 12px; padding: 8px 10px; }
  }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div class="load-text">RENDERING GRAPH</div>
</div>
<canvas id="graph-canvas"></canvas>
<div id="hud">
  <span class="title">✦ Knowledge Graph</span>
  <span class="count" id="node-count">0 nodes</span>
  <span class="sep"></span>
  <input id="search-input" type="text" placeholder="Search notes..." spellcheck="false">
</div>
<div id="tooltip"></div>
<div id="controls">
  <label><input type="checkbox" id="chk-labels" checked> <span>Labels</span></label>
  <span class="ctrl-sep"></span>
  <label><input type="checkbox" id="chk-gravity" checked> <span>Gravity</span></label>
  <span class="ctrl-sep"></span>
  <label><input type="checkbox" id="chk-hubs" checked> <span>Hubs</span></label>
</div>
<div id="legend"></div>
<script src="data.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  'use strict';
  if (typeof NOTES === 'undefined') {
    document.getElementById('loading').querySelector('.load-text').textContent = 'ERROR: Data not loaded';
    return;
  }
  const notes = NOTES;
  const nodeMap = new Map();
  const nodes = [];
  const edges = [];
  const linkSet = new Set();
  
  notes.forEach((n, i) => {
    const node = {
      id: i,
      title: n.title,
      fname: n.fname,
      category: n.category || 'Uncategorized',
      preview: n.preview || '',
      links: n.links || [],
      x: Math.random() * 2000 - 1000,
      y: Math.random() * 2000 - 1000,
      vx: 0, vy: 0,
      linkCount: 0,
    };
    nodes.push(node);
    nodeMap.set(n.title, node);
    nodeMap.set(n.fname, node);
  });
  
  nodes.forEach((node) => {
    (node.links || []).forEach((link) => {
      if (!link.exists) return;
      const targetTitle = link.title || link.fname;
      const target = nodeMap.get(targetTitle);
      if (!target) return;
      const edgeKey = Math.min(node.id, target.id) + '-' + Math.max(node.id, target.id);
      if (linkSet.has(edgeKey)) return;
      linkSet.add(edgeKey);
      edges.push({ source: node.id, target: target.id });
      node.linkCount++;
      target.linkCount++;
    });
  });
  
  const CATEGORY_COLORS = {
    'Quran': '#7EB8DA',
    'Hadith': '#D4A574',
    'Aqeedah': '#A8D5A2',
    'Fiqh': '#E8B86D',
    'Seerah': '#C9A0DC',
    'History': '#8FB3C9',
    'Tazkiyah': '#F0A0A0',
    'Dua': '#A8D8D8',
    'Root': '#B8B8C8',
    'Uncategorized': '#888',
  };
  const colorScale = (cat) => CATEGORY_COLORS[cat] || '#888';
  const cats = [...new Set(nodes.map(n => n.category))].sort();
  
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  let W, H;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(50).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-250))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(4))
    .alphaDecay(0.005)
    .on('tick', () => { if (!dragging) draw(); });
  
  let hoveredNode = null;
  let selectedNode = null;
  let draggedNode = null;
  let dragging = false;
  let showLabels = true;
  let showHubs = true;
  let searchQuery = '';
  let highlightSet = new Set();
  let transform = { x: 0, y: 0, k: 1 };
  let isPanning = false;
  let lastX, lastY;
  
  function worldToScreen(wx, wy) {
    return { x: wx * transform.k + W/2 + transform.x, y: wy * transform.k + H/2 + transform.y };
  }
  function screenToWorld(sx, sy) {
    return { x: (sx - W/2 - transform.x) / transform.k, y: (sy - H/2 - transform.y) / transform.k };
  }
  
  function draw() {
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
    bg.addColorStop(0, '#0f0f1a');
    bg.addColorStop(1, '#06060e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    
    const showLabelsNow = showLabels;
    const showHubsNow = showHubs;
    const hasSearch = searchQuery.length > 0;
    
    // Draw edges
    ctx.lineWidth = 0.5 / transform.k;
    edges.forEach((e) => {
      const s = nodes[e.source.index || e.source];
      const t = nodes[e.target.index || e.target];
      if (!s || !t) return;
      const p1 = worldToScreen(s.x, s.y);
      const p2 = worldToScreen(t.x, t.y);
      if (Math.max(p1.x, p2.x) < -50 || Math.min(p1.x, p2.x) > W + 50 ||
          Math.max(p1.y, p2.y) < -50 || Math.min(p1.y, p2.y) > H + 50) return;
      const isHighlighted = highlightSet.has(s) && highlightSet.has(t);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      if (hasSearch) {
        ctx.strokeStyle = isHighlighted ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.02)';
      } else if (highlightSet.size > 0) {
        ctx.strokeStyle = isHighlighted ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.02)';
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      }
      ctx.stroke();
    });
    
    // Draw nodes
    const nodeRadius = Math.max(2.5, Math.min(6, 4.5 / transform.k));
    nodes.forEach((n) => {
      const s = worldToScreen(n.x, n.y);
      const isHovered = hoveredNode === n;
      const isSelected = selectedNode === n;
      const inHighlight = highlightSet.has(n);
      const isHub = showHubsNow && n.linkCount > 20;
      let r = nodeRadius;
      if (isSelected) r = nodeRadius * 2.5;
      else if (isHovered) r = nodeRadius * 1.8;
      else if (isHub) r = nodeRadius * 0.5 + Math.min(n.linkCount * 0.15, 5);
      let alpha = 0.7;
      if (hasSearch) alpha = inHighlight ? 0.9 : 0.06;
      else if (highlightSet.size > 0) alpha = inHighlight ? 0.85 : 0.06;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fillStyle = colorScale(n.category);
      ctx.globalAlpha = alpha;
      ctx.fill();
      if (isHovered || isSelected) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, r + 2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // Label
      if (showLabelsNow && (isHovered || isSelected || (isHub && transform.k > 0.3) || transform.k > 0.6)) {
        const fontSize = Math.max(10, Math.min(14, 13 / transform.k));
        ctx.font = fontSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'center';
        const label = n.title.length > 30 ? n.title.slice(0, 28) + '\u2026' : n.title;
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(s.x - tw/2 - 4, s.y + r + 2, tw + 8, fontSize + 4);
        ctx.fillStyle = isHovered || isSelected ? '#fff' : 'rgba(255,255,255,0.5)';
        ctx.fillText(label, s.x, s.y + r + fontSize + 2);
      }
    });
    document.getElementById('node-count').textContent = nodes.length + ' nodes · ' + edges.length + ' links';
  }
  
  function getNodeAt(sx, sy) {
    const w = screenToWorld(sx, sy);
    const threshold = 10 / transform.k;
    let closest = null;
    let closestDist = Infinity;
    for (const n of nodes) {
      if (!n.x && n.x !== 0) continue;
      const dx = n.x - w.x;
      const dy = n.y - w.y;
      const dist = dx * dx + dy * dy;
      if (dist < threshold * threshold && dist < closestDist) {
        closest = n;
        closestDist = dist;
      }
    }
    return closest;
  }
  
  function computeHighlight(node) {
    highlightSet.clear();
    if (!node) return;
    highlightSet.add(node);
    edges.forEach((e) => {
      const s = nodes[e.source.index || e.source];
      const t = nodes[e.target.index || e.target];
      if (s === node) highlightSet.add(t);
      if (t === node) highlightSet.add(s);
    });
  }
  
  function showTooltip(node, sx, sy) {
    const title = node.title;
    const cat = node.category;
    const preview = (node.preview || '').replace(/[*_~#]/g, '').slice(0, 150);
    const linkCount = node.linkCount;
    tooltip.innerHTML = '<div class="tt-title">' + escHtml(title) + '</div><div class="tt-cat">' + escHtml(cat) + '</div><div class="tt-preview">' + escHtml(preview) + '</div><div class="tt-links">' + linkCount + ' connections</div>';
    tooltip.classList.add('visible');
    let tx = sx + 14, ty = sy - 10;
    const tr = tooltip.getBoundingClientRect();
    if (tx + tr.width > W - 10) tx = sx - tr.width - 14;
    if (ty + tr.height > H - 10) ty = H - tr.height - 10;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  }
  
  function hideTooltip() { tooltip.classList.remove('visible'); }
  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  
  // Mouse events
  canvas.addEventListener('mousedown', function(e) {
    var sx = e.clientX, sy = e.clientY;
    var node = getNodeAt(sx, sy);
    if (node) {
      draggedNode = node;
      dragging = true;
      sim.alphaTarget(0.3).restart();
      node.fx = node.x;
      node.fy = node.y;
    } else {
      isPanning = true;
      lastX = sx;
      lastY = sy;
      canvas.style.cursor = 'grabbing';
    }
  });
  
  window.addEventListener('mousemove', function(e) {
    var sx = e.clientX, sy = e.clientY;
    if (dragging && draggedNode) {
      var w = screenToWorld(sx, sy);
      draggedNode.fx = w.x;
      draggedNode.fy = w.y;
      return;
    }
    if (isPanning) {
      transform.x += sx - lastX;
      transform.y += sy - lastY;
      lastX = sx;
      lastY = sy;
      draw();
      return;
    }
    var node = getNodeAt(sx, sy);
    if (node !== hoveredNode) {
      hoveredNode = node;
      if (node) {
        computeHighlight(node);
        showTooltip(node, sx, sy);
        canvas.style.cursor = 'pointer';
      } else {
        highlightSet.clear();
        hideTooltip();
        canvas.style.cursor = 'grab';
      }
      draw();
    } else if (node && tooltip.classList.contains('visible')) {
      var tx = sx + 14, ty = sy - 10;
      var tr = tooltip.getBoundingClientRect();
      if (tx + tr.width > W - 10) tx = sx - tr.width - 14;
      if (ty + tr.height > H - 10) ty = H - tr.height - 10;
      if (ty < 10) ty = 10;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    }
  });
  
  window.addEventListener('mouseup', function() {
    if (dragging && draggedNode) {
      draggedNode.fx = null;
      draggedNode.fy = null;
      draggedNode = null;
      dragging = false;
      sim.alphaTarget(0);
    }
    if (isPanning) {
      isPanning = false;
      canvas.style.cursor = 'grab';
    }
  });
  
  canvas.addEventListener('click', function(e) {
    if (dragging) return;
    var node = getNodeAt(e.clientX, e.clientY);
    if (node) {
      if (selectedNode === node) {
        selectedNode = null;
        highlightSet.clear();
        hideTooltip();
      } else {
        selectedNode = node;
        computeHighlight(node);
        showTooltip(node, e.clientX, e.clientY);
      }
      draw();
    } else {
      selectedNode = null;
      highlightSet.clear();
      hideTooltip();
      draw();
    }
  });
  
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    var newK = transform.k * delta;
    if (newK < 0.05 || newK > 10) return;
    var sx = e.clientX, sy = e.clientY;
    var wx = (sx - W/2 - transform.x) / transform.k;
    var wy = (sy - H/2 - transform.y) / transform.k;
    transform.k = newK;
    transform.x = sx - W/2 - wx * transform.k;
    transform.y = sy - H/2 - wy * transform.k;
    draw();
  }, { passive: false });
  
  // Touch support
  var touchStartX, touchStartY, touchDist = 0;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      var t = e.touches[0];
      touchStartX = t.clientX; touchStartY = t.clientY;
      var node = getNodeAt(t.clientX, t.clientY);
      if (node) {
        draggedNode = node; dragging = true;
        sim.alphaTarget(0.3).restart();
        var w = screenToWorld(t.clientX, t.clientY);
        node.fx = w.x; node.fy = w.y;
      } else {
        isPanning = true; lastX = t.clientX; lastY = t.clientY;
      }
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      touchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });
  
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      var t = e.touches[0];
      if (dragging && draggedNode) {
        var w = screenToWorld(t.clientX, t.clientY);
        draggedNode.fx = w.x; draggedNode.fy = w.y;
      } else if (isPanning) {
        transform.x += t.clientX - lastX;
        transform.y += t.clientY - lastY;
        lastX = t.clientX; lastY = t.clientY;
        draw();
      }
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var newDist = Math.sqrt(dx * dx + dy * dy);
      if (touchDist > 0) {
        var delta = newDist / touchDist;
        var newK = transform.k * delta;
        if (newK >= 0.05 && newK <= 10) {
          var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          var wx = (cx - W/2 - transform.x) / transform.k;
          var wy = (cy - H/2 - transform.y) / transform.k;
          transform.k = newK;
          transform.x = cx - W/2 - wx * transform.k;
          transform.y = cy - W/2 - wy * transform.k;
          draw();
        }
      }
      touchDist = newDist;
    }
  }, { passive: false });
  
  canvas.addEventListener('touchend', function(e) {
    if (dragging && draggedNode) {
      draggedNode.fx = null; draggedNode.fy = null;
      draggedNode = null; dragging = false;
      sim.alphaTarget(0);
    }
    if (isPanning) isPanning = false;
    touchDist = 0;
    if (e.changedTouches.length === 1) {
      var t = e.changedTouches[0];
      if (Math.abs(t.clientX - touchStartX) < 10 && Math.abs(t.clientY - touchStartY) < 10) {
        var node = getNodeAt(t.clientX, t.clientY);
        if (node) { selectedNode = node; computeHighlight(node); draw(); }
      }
    }
  });
  
  // Search
  var searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', function() {
    searchQuery = searchInput.value.trim().toLowerCase();
    if (searchQuery) {
      var matching = nodes.filter(function(n) { return n.title.toLowerCase().includes(searchQuery); });
      highlightSet.clear();
      matching.forEach(function(n) {
        highlightSet.add(n);
        edges.forEach(function(e) {
          var s = nodes[e.source.index || e.source];
          var t = nodes[e.target.index || e.target];
          if (s === n) highlightSet.add(t);
          if (t === n) highlightSet.add(s);
        });
      });
    } else {
      if (hoveredNode) computeHighlight(hoveredNode);
      else highlightSet.clear();
    }
    draw();
  });
  
  // Controls
  document.getElementById('chk-labels').addEventListener('change', function(e) {
    showLabels = e.target.checked;
    draw();
  });
  document.getElementById('chk-gravity').addEventListener('change', function(e) {
    if (e.target.checked) {
      sim.force('center', d3.forceCenter(0, 0));
    } else {
      sim.force('center', null);
    }
    sim.alpha(0.3).restart();
  });
  document.getElementById('chk-hubs').addEventListener('change', function(e) {
    showHubs = e.target.checked;
    draw();
  });
  
  // Legend
  var legendEl = document.getElementById('legend');
  cats.forEach(function(cat) {
    var div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = '<span class="legend-dot" style="background:' + colorScale(cat) + '"></span><span class="legend-label">' + cat + '</span>';
    legendEl.appendChild(div);
  });
  
  // Keyboard
  window.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault(); searchInput.focus();
    }
    if (e.key === 'Escape') {
      searchInput.value = ''; searchQuery = '';
      highlightSet.clear(); selectedNode = null; hideTooltip();
      searchInput.blur(); draw();
    }
    if (e.key === 'l' || e.key === 'L') { document.getElementById('chk-labels').click(); }
    if (e.key === 'r' || e.key === 'R') { transform = { x: 0, y: 0, k: 1 }; draw(); }
  });
  
  // Init
  setTimeout(function() { document.getElementById('loading').classList.add('hidden'); }, 800);
  setTimeout(function() { sim.alphaTarget(0); draw(); }, 8000);
  draw();
  console.log('Graph loaded: ' + nodes.length + ' nodes, ' + edges.length + ' edges, ' + cats.length + ' categories');
})();
</script>
</body>
</html>
