<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Knowledge Vault</title>
<meta name="description" content="Interactive HTML site for the Islamic Knowledge Obsidian vault - Quran, Hadith, and Islamic theology">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1E3A8A; --primary-light: #2D4BA0; --accent: #FFD700;
  --bg: #F8FAFC; --card: #FFFFFF; --text: #1A202C; --text-light: #4A5568;
  --border: #E5E7EB; --shadow: rgba(17,17,26,0.05); --shadow-hover: rgba(17,17,26,0.1);
}
[data-theme="dark"] {
  --primary: #1E3A8A; --bg: #121827; --card: #1E293B; --text: #F1F5F9;
  --text-light: #CBD5E1; --border: #334155; --shadow: rgba(0,0,0,0.2);
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
header {
  background: linear-gradient(135deg, var(--primary), #4A6CF7);
  color: white; padding: 2.5rem 1.5rem; text-align: center; position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
header p { opacity: 0.85; font-size: 1.05rem; }
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem; z-index: 100;
  background: rgba(255,255,255,0.2); border: none; color: white;
  width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; backdrop-filter: blur(8px); transition: transform 0.3s;
}
.theme-toggle:hover { transform: scale(1.1); }
.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.search-section {
  background: var(--card); border-radius: 16px; padding: 1.5rem;
  box-shadow: 0 4px 20px var(--shadow); margin-bottom: 2rem;
  position: sticky; top: 1rem; z-index: 50;
  border: 1px solid var(--border);
}
.search-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
.search-input {
  flex: 1; min-width: 200px; padding: 0.8rem 1.2rem; border: 2px solid var(--border);
  border-radius: 10px; font-size: 1rem; background: var(--bg); color: var(--text);
  transition: border-color 0.3s;
}
.search-input:focus { outline: none; border-color: var(--primary); }
.filter-select {
  padding: 0.8rem 1.2rem; border: 2px solid var(--border); border-radius: 10px;
  font-size: 0.9rem; background: var(--bg); color: var(--text); cursor: pointer;
}
.stats { font-size: 0.9rem; color: var(--text-light); margin-top: 0.8rem; }
.notes-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.2rem;
}
.note-card {
  background: var(--card); border-radius: 12px; padding: 1.5rem;
  box-shadow: 0 2px 10px var(--shadow); border: 1px solid var(--border);
  transition: all 0.3s ease; cursor: pointer; position: relative;
  overflow: hidden;
}
.note-card:hover {
  transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow-hover);
  border-color: var(--primary);
}
.note-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0; transition: opacity 0.3s;
}
.note-card:hover::before { opacity: 1; }
.note-category {
  display: inline-block; padding: 0.2rem 0.7rem; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600; margin-bottom: 0.7rem;
  background: rgba(30,58,138,0.1); color: var(--primary);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.note-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
.note-preview { font-size: 0.9rem; color: var(--text-light); line-height: 1.5; }
.note-links { margin-top: 0.8rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
.note-link {
  display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
  font-size: 0.78rem; background: rgba(45,75,160,0.08); color: var(--primary);
  text-decoration: none; transition: background 0.2s;
}
.note-link:hover { background: rgba(45,75,160,0.15); }
.note-link.missing { background: rgba(239,68,68,0.08); color: #EF4444; }
.link-count { font-size: 0.78rem; color: var(--text-light); margin-top: 0.5rem; }
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200; backdrop-filter: blur(4px);
  justify-content: center; align-items: center; padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: 16px; max-width: 900px; width: 100%;
  max-height: 85vh; overflow-y: auto; padding: 2rem; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px;
  border-radius: 50%; border: none; background: var(--border); cursor: pointer;
  font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  transition: background 0.3s; color: var(--text);
}
.modal-close:hover { background: var(--text-light); color: white; }
.modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
.modal-path { font-size: 0.85rem; color: var(--text-light); margin-bottom: 1.5rem; word-break: break-all; }
.modal-section { margin-bottom: 1.5rem; }
.modal-section h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
.modal-links { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.modal-body {
  font-size: 0.95rem; line-height: 1.7; color: var(--text);
  max-height: 50vh; overflow-y: auto; white-space: pre-wrap;
  padding: 1rem; background: var(--bg); border-radius: 8px;
  border: 1px solid var(--border);
}
@media (max-width: 768px) {
  .notes-grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.6rem; }
  .search-row { flex-direction: column; }
  .search-input { min-width: 100%; }
  .modal { padding: 1.5rem; }
}
.loading { text-align: center; padding: 3rem; color: var(--text-light); }
.loading i { font-size: 2rem; margin-bottom: 1rem; display: block; }
footer {
  text-align: center; padding: 2rem; color: var(--text-light); font-size: 0.9rem;
  border-top: 1px solid var(--border); margin-top: 2rem;
}
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
<header>
  <h1>📚 Islamic Knowledge Vault</h1>
  <p>Interactive exploration of Quran, Hadith, and Islamic theology</p>
</header>
<div class="container">
  <div class="search-section">
    <div class="search-row">
      <input type="text" class="search-input" id="search" placeholder="Search notes..." oninput="filterNotes()">
      <select class="filter-select" id="category-filter" onchange="filterNotes()">
        <option value="all">All Categories</option>
      </select>
      <select class="filter-select" id="link-filter" onchange="filterNotes()">
        <option value="all">Any Links</option>
        <option value="has">Has Links</option>
        <option value="no">No Links</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="loading" id="loading"><i>⏳</i> Loading notes...</div>
  <div class="notes-grid" id="notes-grid"></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<footer>
  <p>Generated from Obsidian Vault — <span id="year"></span></p>
</footer>
<script src="data.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

// Populate categories
const catSelect = document.getElementById('category-filter');
for (const cat of Object.keys(CATEGORIES).sort()) {
  const opt = document.createElement('option');
  opt.value = cat; opt.textContent = cat;
  catSelect.appendChild(opt);
}

let allNotes = NOTES;
filterNotes();
document.getElementById('loading').style.display = 'none';

function filterNotes() {
  const query = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  const linkFilter = document.getElementById('link-filter').value;

  const filtered = allNotes.filter(n => {
    if (cat !== 'all' && n.category !== cat) return false;
    if (query && !n.title.toLowerCase().includes(query) &&
        !n.preview.toLowerCase().includes(query)) return false;
    if (linkFilter === 'has' && (!n.links || n.links.length === 0)) return false;
    if (linkFilter === 'no' && n.links && n.links.length > 0) return false;
    return true;
  });

  renderNotes(filtered);
  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${allNotes.length} notes`;
}

function renderNotes(notes) {
  const grid = document.getElementById('notes-grid');
  if (notes.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-light);grid-column:1/-1">No notes found</div>';
    return;
  }
  grid.innerHTML = notes.map(n => {
    const linkCount = (n.links || []).length;
    return \`
      <div class="note-card" onclick="openModal('\${n.title.replace(/'/g, "\\'")}')">
        <div class="note-category">\${n.category}</div>
        <div class="note-title">\${n.title}</div>
        <div class="note-preview">\${n.preview || 'No preview available'}</div>
        \${linkCount > 0 ? \`<div class="link-count">\${linkCount} link\${linkCount > 1 ? 's' : ''}</div>\` : ''}
      </div>
    \`;
  }).join('');
}

function openModal(title) {
  const note = allNotes.find(n => n.title === title);
  if (!note) return;

  const links = LINKS[title] || [];
  const existingLinks = links.filter(l => l.exists);
  const missingLinks = links.filter(l => !l.exists);

  document.getElementById('modal-content').innerHTML = \`
    <div class="modal-title">\${note.title}</div>
    <div class="modal-path">\${note.path}</div>
    \${existingLinks.length > 0 ? \`
      <div class="modal-section">
        <h3>🔗 Links (\${existingLinks.length})</h3>
        <div class="modal-links">
          \${existingLinks.map(l => \`<a href="#" class="note-link" onclick="event.preventDefault();openModal('\${l.title.replace(/'/g, "\\'")}')">\${l.title}</a>\`).join('')}
        </div>
      </div>
    \` : ''}
    \${missingLinks.length > 0 ? \`
      <div class="modal-section">
        <h3>⚠️ Missing Links (\${missingLinks.length})</h3>
        <div class="modal-links">
          \${missingLinks.map(l => \`<span class="note-link missing">\${l.title}</span>\`).join('')}
        </div>
      </div>
    \` : ''}
    <div class="modal-section">
      <h3>📄 Content</h3>
      <div class="modal-body">\${note.preview || 'No content available'}</div>
    </div>
  \`;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('active');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}

// Restore theme
if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('theme-toggle').textContent = '☀️';
}
</script>
</body>
</html>
